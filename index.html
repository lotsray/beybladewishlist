<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>鹿埔戰隊聯合採購願望池</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <h1>鹿埔戰隊聯合採購願望池</h1>
    <nav><a href="dashboard.html">查看需求總覽</a></nav>
  </div>
</header>

<main class="container">
  <section class="card">
    <h2>填寫願望清單</h2>
    <label for="name">暱稱</label>
    <input id="name" placeholder="例如：鹿埔小隊">

    <div id="items"></div>

    <button type="button" class="secondary" onclick="addItemRow()">＋ 新增品項</button>
    <button type="button" onclick="submitWishlist()">送出願望</button>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <h2>填寫說明</h2>
    <p>可一次新增多個品項；若清單沒有，請選「其他／自訂品項」。送出後會自動彙整到群組需求總覽。</p>
  </section>
</main>

<script src="js/config.js"></script>
<script>
function escapeHtml(text) {
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function buildOptions() {
  return ITEM_OPTIONS.map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join("");
}

function addItemRow() {
  const box = document.getElementById("items");
  const div = document.createElement("div");
  div.className = "item-row";
  div.innerHTML = `
    <label>想買品項</label>
    <select class="itemSelect" onchange="toggleCustom(this)">
      <option value="">請選擇品項</option>
      ${buildOptions()}
      <option value="custom">其他／自訂品項</option>
    </select>
    <input class="customItem" placeholder="自訂品項名稱" style="display:none;">
    <div class="row">
      <div>
        <label>數量</label>
        <input class="qty" type="number" min="1" value="1">
      </div>
      <div>
        <label>備註</label>
        <input class="note" placeholder="可不填">
      </div>
      <button type="button" class="danger" onclick="this.closest('.item-row').remove()">刪</button>
    </div>
  `;
  box.appendChild(div);
}

function toggleCustom(select) {
  const row = select.closest(".item-row");
  const custom = row.querySelector(".customItem");
  custom.style.display = select.value === "custom" ? "block" : "none";
}

function getRows() {
  const name = document.getElementById("name").value.trim();
  const rows = [...document.querySelectorAll(".item-row")].map(row => {
    const selectValue = row.querySelector(".itemSelect").value;
    const customValue = row.querySelector(".customItem").value.trim();
    const item = selectValue === "custom" ? customValue : selectValue;
    const qty = Number(row.querySelector(".qty").value || 1);
    const note = row.querySelector(".note").value.trim();
    return { name, item, qty, note };
  }).filter(r => r.name && r.item && r.qty > 0);
  return rows;
}

async function submitWishlist() {
  const status = document.getElementById("status");
  const rows = getRows();

  if (!document.getElementById("name").value.trim()) {
    status.textContent = "請先輸入暱稱。";
    status.style.color = "#b91c1c";
    return;
  }
  if (rows.length === 0) {
    status.textContent = "請至少選擇一個品項。";
    status.style.color = "#b91c1c";
    return;
  }

  status.textContent = "送出中...";
  status.style.color = "#111827";

  try {
    for (const row of rows) {
      const res = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(row)
      });
      const result = await res.json();
      if (!result.success) throw new Error(result.message || "送出失敗");
    }
    status.textContent = `已成功送出 ${rows.length} 筆願望！`;
    status.style.color = "green";
    document.getElementById("items").innerHTML = "";
    addItemRow();
  } catch (err) {
    status.textContent = "送出失敗：" + err.message;
    status.style.color = "#b91c1c";
  }
}

addItemRow();
</script>
</body>
</html>
